<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }

        .input-area {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            width: 120px;
            font-size: 16px;
        }

        input:focus {
            border-color: #3498db;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
        }

        .btn-push {
            background-color: #2ecc71;
            color: white;
        }

        .btn-push:hover {
            background-color: #27ae60;
        }

        .btn-pop {
            background-color: #e74c3c;
            color: white;
        }

        .btn-pop:hover {
            background-color: #c0392b;
        }

        /* The Stack Visual Container */
        .stack-container {
            border: 4px solid #34495e;
            border-top: none;
            border-radius: 0 0 8px 8px;
            width: 150px;
            min-height: 250px;
            margin: 0 auto;
            display: flex;
            flex-direction: column-reverse;
            /* Aligns items from bottom to top */
            align-items: center;
            padding: 10px;
            gap: 8px;
            background-color: #fafafa;
        }

        /* Stack Elements */
        .stack-item {
            width: 100%;
            height: 40px;
            background-color: #3498db;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 4px;
            animation: pushAnimation 0.3s ease-out;
        }

        .info-text {
            margin-top: 15px;
            font-size: 14px;
            color: #7f8c8d;
            min-height: 20px;
        }

        @keyframes pushAnimation {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Stack UI Visualizer</h2>

        <div class="input-area">
            <input type="text" id="stackInput" placeholder="Enter value" maxlength="10">
            <button class="btn-push" onclick="push()">Push</button>
            <button class="btn-pop" onclick="pop()">Pop</button>
        </div>

        <div class="stack-container" id="stackContainer">
        </div>

        <div class="info-text" id="statusMessage">Stack is empty.</div>
    </div>
    <script src="stack.js">
    </script>
</body>

</html>
