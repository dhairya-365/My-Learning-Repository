<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Visualizer Boilerplate</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 450px;
        }

        .input-area {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            width: 120px;
            font-size: 16px;
        }

        input:focus {
            border-color: #9b59b6;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            color: white;
        }

        .btn-enqueue {
            background-color: #9b59b6;
        }

        .btn-enqueue:hover {
            background-color: #8e44ad;
        }

        .btn-dequeue {
            background-color: #e67e22;
        }

        .btn-dequeue:hover {
            background-color: #d35400;
        }

        /* The Queue Visual Container (Horizontal Pipe Layout) */
        .queue-container {
            border-top: 4px solid #34495e;
            border-bottom: 4px solid #34495e;
            width: 100%;
            height: 60px;
            margin: 20px auto;
            display: flex;
            flex-direction: row;
            /* Aligns items from Left (Front) to Right (Rear) */
            align-items: center;
            justify-content: flex-start;
            padding: 5px;
            gap: 8px;
            background-color: #fafafa;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Queue Elements */
        .queue-item {
            width: 60px;
            height: 100%;
            background-color: #a29bfe;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 4px;
            flex-shrink: 0;
            animation: enqueueAnimation 0.3s ease-out;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            color: #7f8c8d;
            font-size: 12px;
            font-weight: bold;
        }

        .info-text {
            margin-top: 15px;
            font-size: 14px;
            color: #7f8c8d;
            min-height: 20px;
        }

        @keyframes enqueueAnimation {
            from {
                transform: translateX(50px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Queue UI Visualizer</h2>

        <div class="input-area">
            <input type="text" id="queueInput" placeholder="Enter value" maxlength="5">
            <button class="btn-enqueue" onclick="enqueue()">Enqueue</button>
            <button class="btn-dequeue" onclick="popQueue()">Dequeue</button>
        </div>

        <div class="labels">
            <span>← FRONT (Exit)</span>
            <span>REAR (Entry) →</span>
        </div>

        <div class="queue-container" id="queueContainer">
        </div>

        <div class="info-text" id="statusMessage">Queue is empty.</div>
    </div>
    <script src="queue.js"></script>
</body>

</html>
